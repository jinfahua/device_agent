# Device Agent Configuration Example

# MQTT Configuration
mqtt:
  broker: localhost
  port: 1883
  username: null
  password: null
  client_id: device_agent_001
  use_ssl: false
  topic_prefix: home/devices

# LLM Configuration (for natural language understanding)
llm:
  provider: anthropic  # or "openai"
  api_key: null  # Set via ANTHROPIC_API_KEY env var
  model: claude-3-5-sonnet-20241022
  temperature: 0.0

# Memory namespace
memory_namespace: device_agent

# Logging
log_level: INFO
